<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股月線/周線選股系統</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>台股月線 / 周線選股系統</h1>
  <div class="header-info">
    <span id="updateTime">更新時間: -</span>
    <span id="stockCount">-</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="monthly">📈 月線篩選</button>
  <button class="tab-btn" data-tab="weekly">📊 周線篩選</button>
</nav>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>載入數據中...</p>
</div>

<div id="listView" class="view">
  <div class="table-container">
    <table id="stockTable">
      <thead>
        <tr>
          <th>代號</th>
          <th>名稱</th>
          <th>收盤價</th>
          <th>MA5</th>
          <th>MA10</th>
          <th>MA20</th>
          <th>MA60</th>
          <th>最大乖離率</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <p id="emptyMsg" class="empty-msg"></p>
</div>

<div id="detailView" class="view hidden">
  <div class="detail-header">
    <button id="backBtn" class="back-btn">← 返回列表</button>
    <div class="detail-info">
      <h2 id="stockTitle">-</h2>
      <div class="detail-tabs">
        <button class="detail-tab-btn" data-timeframe="daily">日線</button>
        <button class="detail-tab-btn" data-timeframe="weekly">周線</button>
        <button class="detail-tab-btn active" data-timeframe="monthly">月線</button>
      </div>
    </div>
  </div>
  <div id="chartContainer" style="width:100%;height:600px;"></div>
</div>

<div id="errorMsg" class="error-msg hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
