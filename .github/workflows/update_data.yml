name: 更新台股選股數據

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝依賴套件
        run: pip install -r scripts/requirements.txt

      - name: 執行選股分析
        run: python scripts/fetch_and_analyze.py
        timeout-minutes: 120

      - name: 提交更新數據
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Stock Analyzer Bot"
          git add docs/data/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自動更新台股選股數據 $(date '+%Y-%m-%d')"
          git push
